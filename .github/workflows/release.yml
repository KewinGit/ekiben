name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  apt-repo:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tooling
        run: sudo apt-get update && sudo apt-get install -y apt-utils dpkg-dev
      - name: Download release .debs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --pattern '*.deb' --dir dist
      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
      - name: Checkout gh-pages
        # the gh-pages branch must already exist (see apt/KEY-RUNBOOK.md step 3)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages
      - name: Generate repo
        run: ./apt/gen-repo.sh dist pages
      - name: Commit & push gh-pages
        env:
          REF: ${{ github.ref_name }}
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes to publish"; exit 0
          fi
          git commit -m "VAR: pubblica APT repo per ${REF}"
          git push
